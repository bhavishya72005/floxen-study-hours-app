<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Timer Theme - Floxen</title>
        <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                margin: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: 'Poppins', sans-serif;
                background: linear-gradient(135deg, #c3ecf7, #f6d5f7);
                color: #2b2e4a;
                padding: 20px;
            }

            .theme-container {
                width: 100%;
                max-width: 900px;
                background: rgba(255, 255, 255, 0.30);
                backdrop-filter: blur(14px);
                border-radius: 20px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.15);
                padding: 28px;
            }

            h1 {
                margin: 0 0 8px;
                text-align: center;
            }

            p {
                margin: 0 0 24px;
                text-align: center;
                color: #5f5f7a;
            }

            .option-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                gap: 16px;
            }

            .theme-option {
                background: rgba(255, 255, 255, 0.86);
                border: 2px solid transparent;
                border-radius: 16px;
                padding: 16px;
                transition: 0.2s ease;
            }

            .theme-option.active {
                border-color: #764ba2;
                box-shadow: 0 10px 22px rgba(102,126,234,0.25);
            }

            .preview {
                width: 100%;
                height: 150px;
                border-radius: 12px;
                background: #ffffff;
                border: 1px solid rgba(0,0,0,0.08);
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 12px;
                overflow: hidden;
            }

            .option-title {
                font-weight: 600;
                margin: 0 0 6px;
            }

            .option-text {
                margin: 0 0 12px;
                color: #5f5f7a;
                font-size: 14px;
            }

            .select-btn {
                width: 100%;
                border: none;
                border-radius: 12px;
                padding: 10px 12px;
                cursor: pointer;
                background: linear-gradient(135deg, #667eea, #764ba2);
                color: #fff;
                font-weight: 600;
            }

            .footer-row {
                margin-top: 20px;
                text-align: center;
            }

            .back-btn {
                display: inline-block;
                padding: 10px 16px;
                border-radius: 12px;
                text-decoration: none;
                color: #fff;
                background: linear-gradient(135deg, #667eea, #764ba2);
            }

            #status {
                margin-top: 12px;
                font-size: 14px;
                color: #2b2e4a;
                font-weight: 600;
                min-height: 20px;
            }
        </style>
    </head>
    <body>
        <div class="theme-container">
            <h1>Timer Theme</h1>
            <p>Choose how your session timer appears on dashboard.</p>

            <div class="option-grid">
                <div class="theme-option" id="standard-card">
                    <div class="preview">
                        <svg width="170" height="110" viewBox="0 0 170 110" xmlns="http://www.w3.org/2000/svg" aria-label="Standard timer preview">
                            <rect x="20" y="40" width="130" height="42" rx="20" fill="#eef0ff"/>
                            <text x="85" y="67" text-anchor="middle" font-family="Poppins, sans-serif" font-size="18" fill="#2b2e4a">1h 24m 30s</text>
                            <circle cx="85" cy="20" r="10" fill="#667eea"/>
                        </svg>
                    </div>
                    <h3 class="option-title">Standard Timer</h3>
                    <p class="option-text">Classic text timer showing hours, minutes, and seconds.</p>
                    <button type="button" class="select-btn" onclick="setTheme('standard')">Use Standard Timer</button>
                </div>

                <div class="theme-option" id="bar-card">
                    <div class="preview">
                        <svg width="170" height="110" viewBox="0 0 170 110" xmlns="http://www.w3.org/2000/svg" aria-label="Bar timer preview">
                            <rect x="18" y="48" width="134" height="16" rx="8" fill="#e8e9f3"/>
                            <rect x="18" y="48" width="78" height="16" rx="8" fill="#764ba2"/>
                            <text x="85" y="37" text-anchor="middle" font-family="Poppins, sans-serif" font-size="14" fill="#2b2e4a">58% completed</text>
                        </svg>
                    </div>
                    <h3 class="option-title">Bar Timer</h3>
                    <p class="option-text">Progress bar timer for quick visual tracking.</p>
                    <button type="button" class="select-btn" onclick="setTheme('bar')">Use Bar Timer</button>
                </div>
            </div>

            <div class="footer-row">
                <a class="back-btn" href="{{ url_for('dashboard') }}">Back to Dashboard</a>
                <div id="status"></div>
            </div>
        </div>

        <script>
            function highlightSelected(theme) {
                document.getElementById("standard-card").classList.toggle("active", theme === "standard");
                document.getElementById("bar-card").classList.toggle("active", theme === "bar");
            }

            function setTheme(theme) {
                localStorage.setItem("timerTheme", theme);
                highlightSelected(theme);
                document.getElementById("status").textContent = "Saved. Selected theme: " + (theme === "bar" ? "Bar Timer" : "Standard Timer");
            }

            const savedTheme = localStorage.getItem("timerTheme") || "standard";
            highlightSelected(savedTheme);
            document.getElementById("status").textContent = "Current theme: " + (savedTheme === "bar" ? "Bar Timer" : "Standard Timer");
        </script>
    </body>
</html>
