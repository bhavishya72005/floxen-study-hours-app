<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Floxen – Focus Better</title>
        <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
        <!-- Google AdSense -->
        <script async
            src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2183701268775294"
            crossorigin="anonymous">
        </script>
        <meta name="robots" content="noindex, nofollow">
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: 'Poppins', sans-serif;
                background: linear-gradient(135deg, #c3ecf7, #f6d5f7);
            }

            .container {
                width: 85%;
                max-width: 950px;
                padding: 30px;
                border-radius: 20px;
                background: rgba(255,255,255,0.25);
                backdrop-filter: blur(14px);
                box-shadow: 0 20px 40px rgba(0,0,0,0.15);
                text-align: center;
            }

            h1 { color: #2b2e4a; }
            p  { color: #5f5f7a; }

            input, textarea {
                width: 70%;
                padding: 12px;
                border-radius: 30px;
                border: none;
                outline: none;
                margin-bottom: 15px;
                font-size: 15px;
            }

            button {
                background: linear-gradient(135deg, #667eea, #764ba2);
                color: white;
                border: none;
                padding: 12px 26px;
                border-radius: 30px;
                cursor: pointer;
                font-size: 14px;
                transition: 0.3s;
            }
            .duration-input {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 10px;
                margin-bottom: 20px;
            }

            .duration-input input {
                width: 80px;
                text-align: center;
                font-size: 16px;
                border-radius: 12px;
            }

            .duration-input span {
                font-weight: 600;
                font-size: 16px;
                color: #333;
            }
            button:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            }

            #stop-session {
                display: none;
                background: linear-gradient(135deg, #ff4b2b, #ff416c);
                margin-top: 15px;
            }

            .banner {
                position: relative;
                margin: 25px auto;
                width: 100%;
                border-radius: 15px;
                overflow: hidden;
            }

            .banner img {
                width: 100%;
            }

            .overlay-text {
                position: absolute;
                inset: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 1.4rem;
                font-weight: 600;
                color: white;
                background: rgba(0,0,0,0.4);
            }

            #timer {
                margin-top: 20px;
                padding: 10px 20px;
                display: inline-block;
                background: rgba(0,0,0,0.15);
                border-radius: 20px;
                font-weight: 600;
            }

            #timer-progress-wrap {
                display: none;
                width: 100%;
                max-width: 420px;
                height: 14px;
                margin: 12px auto 0;
                border-radius: 999px;
                background: rgba(255,255,255,0.45);
                overflow: hidden;
                box-shadow: inset 0 0 6px rgba(0,0,0,0.12);
            }

            #timer-progress-bar {
                width: 0%;
                height: 100%;
                background: linear-gradient(135deg, #667eea, #764ba2);
                transition: width 1s linear;
            }

            #video-container iframe {
                width: 100%;
                height: 380px;
                margin-top: 25px;
                border-radius: 15px;
                box-shadow: 0 15px 30px rgba(0,0,0,0.25);
            }

            .notepad-container {
                margin-top: 10px;
                text-align: left;
            }

            .notepad-editor {
                width: 100%;
                min-height: 180px;
                padding: 16px 18px;
                border-radius: 16px;
                border: 1px solid rgba(43, 46, 74, 0.25);
                background: rgba(255, 255, 255, 0.92);
                font-family: 'Poppins', sans-serif;
                font-size: 0.95rem;
                line-height: 1.6;
                color: #2b2e4a;
                outline: none;
                box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.05);
                overflow-y: auto;
            }

            .notepad-editor:focus {
                border-color: #667eea;
                box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
            }

            .notepad-editor:empty::before {
                content: attr(data-placeholder);
                color: rgba(43, 46, 74, 0.45);
                pointer-events: none;
                display: block;
                font-weight: 400;
            }

            .notepad-header {
                margin-bottom: 10px;
                padding: 10px 14px;
                border-radius: 12px;
                background: rgba(255, 255, 255, 0.65);
                backdrop-filter: blur(10px);
                display: flex;
                justify-content: space-between;
                align-items: center;
                border: 1px solid rgba(118, 75, 162, 0.2);
                box-shadow: inset 0 0 6px rgba(118, 75, 162, 0.2);
            }

            .notepad-header__title {
                text-align: left;
                line-height: 1.2;
            }

            .notepad-header__title span {
                font-weight: 600;
                color: #2b2e4a;
                display: block;
            }

            .notepad-header__title small {
                color: #5f5f7a;
                font-size: 0.75rem;
            }

            .notepad-controls {
                display: flex;
                gap: 6px;
            }

            .notepad-controls button {
                border: 1px solid rgba(43, 46, 74, 0.3);
                background: rgba(255,255,255,0.8);
                color: #2b2e4a;
                font-weight: 600;
                border-radius: 8px;
                padding: 4px 10px;
                cursor: pointer;
                font-size: 0.85rem;
                transition: transform 0.2s ease, border-color 0.2s ease;
            }

            .notepad-controls button:hover {
                border-color: #764ba2;
                transform: translateY(-1px);
            }


            /* CHATBOT */
            .chatbot-container {
                margin-top: 10px;
                text-align: left;
            }

            .h2-heading {
                height: 195px;
                width: 210px;
            }

            #chat-box {
                height: 220px;
                overflow-y: auto;
                padding: 15px;
                border-radius: 15px;
                background: rgba(255,255,255,0.35);
                box-shadow: inset 0 0 8px rgba(0,0,0,0.15);
                margin-bottom: 10px;
                font-size: 14px;
            }

            .message { margin-bottom: 10px; }
            .user { font-weight: 600; color: #333; }
            .bot  { color: #5a4fcf; }
            .message-text {
                white-space: pre-wrap;
            }
            .chat-input {
                display: flex;
                gap: 10px;
            }

            .chat-input input {
                flex: 1;
            }

            /* Floating menu */
            .fab-wrapper {
                position: fixed;
                right: 24px;
                bottom: 24px;
                z-index: 999;
                display: flex;
                flex-direction: column;
                align-items: flex-end;
                gap: 10px;
            }

            .fab-menu {
                display: none;
                min-width: 190px;
                padding: 8px;
                border-radius: 12px;
                background: rgba(255, 255, 255, 0.95);
                box-shadow: 0 12px 24px rgba(0,0,0,0.18);
                border: 1px solid rgba(0,0,0,0.08);
            }

            .fab-menu.open {
                display: block;
            }

            .fab-menu button {
                width: 100%;
                text-align: left;
                border: none;
                border-radius: 10px;
                padding: 10px 12px;
                margin: 2px 0;
                background: transparent;
                color: #2b2e4a;
                font-size: 14px;
                cursor: pointer;
            }

            .fab-menu button:hover {
                background: rgba(118, 75, 162, 0.10);
                transform: none;
                box-shadow: none;
            }

            .fab-button {

                position: fixed;
                bottom: 25px;
                right: 25px;
                width: 60px;
                height: 60px;
                border-radius: 50%;
                border: none;
                background: linear-gradient(135deg, #667eea, #764ba2);
                color: #fff;
                font-size: 28px;
                display: flex;
                align-items: center;
                justify-content: center;
                line-height: 1;
                cursor: pointer;
                box-shadow: 0 10px 22px rgba(0,0,0,0.24);
                padding: 0;
            }
            .fab-icon {
                width: 38px;
                height: 38px;
                object-fit: contain;
            }
        </style>
    </head>

    <body>

        <div class="container">

            <p>Logged in with <b>{{ session['email'] }}</b></p>

            <h1>Focus Session</h1>
            <p>Enter your study duration & a YouTube focus video</p>

            <div class="duration-input">
                <input type="number" id="hours" min="0" value="0">
                <span>h</span>

                <input type="number" id="minutes" min="0" max="59" value="0">
                <span>m</span>
            </div>


            <form id="video-form">
                <input type="url" id="youtube-link" placeholder="Paste YouTube link here" required>
                <br><br>
                <button type="submit">Start Focus</button>
            </form>

            <div id="timer"></div>
            <div id="timer-progress-wrap">
                <div id="timer-progress-bar"></div>
            </div>
            <div id="video-container"></div>

            <button id="stop-session">Stop Session</button>

            <div class="notepad-container">
                <img src="/static/notepad-text.png" alt="Notepad" class="h2-heading">
                <div class="notepad-header">
                    <div class="notepad-header__title">
                        <span>Formatting Tool</span>
                        <small>minimal but powerful</small>
                    </div>
                    <div class="notepad-controls">
                        <button type="button" data-format="h1">H1</button>
                        <button type="button" data-format="h2">H2</button>
                        <button type="button" data-format="normal">Normal</button>
                        <button type="button" data-format="bold">B</button>
                        <button type="button" data-format="bullet">•</button>
                    </div>
                </div>
                <div class="notepad-editor" contenteditable="true" role="textbox" aria-label="Notepad" data-placeholder="Write your thoughts here..."></div>
            </div>

            <!-- CHATBOT -->
            <div class="chatbot-container">
                <img src="/static/assistant-text.png" alt="Notepad" class="h2-heading">

                <div id="chat-box"></div>

                <div class="chat-input">
                    <input type="text" id="chat-input" placeholder="Ask a study doubt..." />
                    <button type="button" onclick="sendMessage()">Send</button>
                </div>
            </div>

        </div>

        <div class="fab-wrapper">
            <div class="fab-menu" id="fab-menu">
                <button type="button" onclick="window.location.href='/timer-theme'">Timer Theme</button>
                <button type="button" onclick="window.location.href='/your-activity'">Your Activity</button>
                <button type="button">Notifications</button>
            </div>
            <button type="button" class="fab-button" id="fab-toggle" aria-label="Open quick menu">
                 <img src="/static/menu-icon.png" alt="Menu" class="fab-icon">
            </button>
        </div>

        <script>
            let interval;
            let totalSessionSeconds = 0;
            const timerTheme = localStorage.getItem("timerTheme") || "standard";

            applyTimerTheme();

            function applyTimerTheme() {
                const timerBox = document.getElementById("timer");
                const progressWrap = document.getElementById("timer-progress-wrap");
                if (timerTheme === "bar") {
                    progressWrap.style.display = "block";
                    timerBox.textContent = "Ready to start";
                } else {
                    progressWrap.style.display = "none";
                    timerBox.textContent = "";
                }
            }

            /* FOCUS SESSION */
            document.getElementById('video-form').addEventListener('submit', e => {
                e.preventDefault();

                const hours = parseInt(document.getElementById('hours').value) || 0;
                const minutes = parseInt(document.getElementById('minutes').value) || 0;

                if (minutes > 59) {
                    alert("Minutes must be less than 60");
                    return;
                }

                const totalSeconds = (hours * 3600) + (minutes * 60);

                if (totalSeconds <= 0) {
                    alert("Enter valid study duration");
                    return;
                }


                const link = document.getElementById('youtube-link').value;
                const id = link.match(/(?:v=|be\/)([a-zA-Z0-9_-]{11})/)?.[1];
                if (!id) {
                    alert("Invalid YouTube link");
                    return;
                }

                document.getElementById('video-container').innerHTML =
                    `<iframe width="560" height="315"
                    src="https://www.youtube.com/embed/${id}?autoplay=1"
                    allow="autoplay" allowfullscreen></iframe>`;

                logActivity(link, id);
                startTimer(totalSeconds);
                document.getElementById('stop-session').style.display = 'inline-block';
                document.documentElement.requestFullscreen?.();
            });

            document.getElementById('stop-session').onclick = stopSession;

            function startTimer(sec) {
                const t = document.getElementById('timer');
                const bar = document.getElementById('timer-progress-bar');
                clearInterval(interval);
                totalSessionSeconds = sec;
                bar.style.width = "0%";
                interval = setInterval(() => {
                    const h = Math.floor(sec / 3600);
                    const m = Math.floor((sec % 3600) / 60);
                    const s = sec % 60;
                    t.textContent = `${h}h ${m}m ${s}s`;

                    if (timerTheme === "bar" && totalSessionSeconds > 0) {
                        const elapsed = totalSessionSeconds - sec;
                        const percent = Math.min(100, Math.max(0, (elapsed / totalSessionSeconds) * 100));
                        bar.style.width = `${percent}%`;
                    }

                    if (sec-- <= 0) stopSession();
                }, 1000);
            }

            function stopSession() {
                clearInterval(interval);
                document.getElementById('timer').textContent = "Session Ended";
                document.getElementById('timer-progress-bar').style.width = "100%";
                document.getElementById('video-container').innerHTML = "";
                document.getElementById('stop-session').style.display = 'none';
                document.exitFullscreen?.();
            }

            async function logActivity(link, videoId) {
                try {
                    await fetch("/activity/log", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ link: link, video_id: videoId })
                    });
                } catch (err) {
                    // Silent fail: activity logging should not block study flow.
                }
            }

            /* CHATBOT */
            async function sendMessage() {
                const input = document.getElementById("chat-input");
                const message = input.value.trim();
                if (!message) return;

                appendMessage("You", message, "user");
                input.value = "";

                try {
                    const response = await fetch("/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ message })
                    });

                    const data = await response.json();
                    appendMessage("Assistant", data.reply, "bot");

                } catch (err) {
                    appendMessage("Assistant", "Network error. Try again.", "bot");
                }
            }

            document.getElementById("chat-input").addEventListener("keydown", function (event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    sendMessage();
                }
            });

            const fabToggle = document.getElementById("fab-toggle");
            const fabMenu = document.getElementById("fab-menu");

            fabToggle.addEventListener("click", function () {
                fabMenu.classList.toggle("open");
            });

            document.addEventListener("click", function (event) {
                const clickedInsideFab = fabToggle.contains(event.target) || fabMenu.contains(event.target);
                if (!clickedInsideFab) {
                    fabMenu.classList.remove("open");
                }
            });

            function appendMessage(sender, text, cls) {
                const chatBox = document.getElementById("chat-box");
                const div = document.createElement("div");
                div.className = `message ${cls}`;
                const label = document.createElement("strong");
                label.textContent = `${sender}: `;
                const messageText = document.createElement("span");
                messageText.className = "message-text";
                messageText.textContent = text;

                div.appendChild(label);
                div.appendChild(messageText);
                chatBox.appendChild(div);
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            const notepadEditor = document.querySelector(".notepad-editor");
            const notepadButtons = document.querySelectorAll(".notepad-controls button");

            notepadButtons.forEach(button => {
                button.addEventListener("click", () => {
                    if (!notepadEditor) return;
                    notepadEditor.focus();
                    applyNotepadAction(button.dataset.format);
                });
            });

            function applyNotepadAction(format) {
                if (!notepadEditor) return;

                switch (format) {
                    case "h1":
                        document.execCommand("formatBlock", false, "h1");
                        break;
                    case "h2":
                        document.execCommand("formatBlock", false, "h2");
                        break;
                    case "normal":
                        document.execCommand("formatBlock", false, "p");
                        break;
                    case "bold":
                        document.execCommand("bold");
                        break;
                    case "bullet":
                        document.execCommand("insertUnorderedList");
                        break;
                }
            }


        </script>

    </body>
</html>
